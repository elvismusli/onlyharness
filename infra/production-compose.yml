services:
  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    restart: unless-stopped
    environment:
      HARNESS_API_HOST: 0.0.0.0
      HARNESS_API_PORT: 8787
      HARNESS_WORKSPACE_ROOT: /app
      HARNESS_CORS_ORIGINS: https://onlyharness.com,https://www.onlyharness.com,https://superskill.sh,https://www.superskill.sh
      GITEA_BASE_URL: ${GITEA_BASE_URL:-https://git.onlyharness.com}
      SUPABASE_URL: ${VITE_SUPABASE_URL}
      SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      HARNESS_PUBLIC_API_URL: ${HARNESS_PUBLIC_API_URL:-https://superskill.sh/api}
      HARNESS_CHECKOUT_BASE_URL: ${HARNESS_CHECKOUT_BASE_URL:-https://superskill.sh/checkout}
      PAYMENTS_ENABLED: ${PAYMENTS_ENABLED:-false}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-manual}
      X402_ENABLED: ${X402_ENABLED:-false}
      X402_PAY_TO: ${X402_PAY_TO:-}
      X402_NETWORK: ${X402_NETWORK:-eip155:8453}
      X402_ASSET: ${X402_ASSET:-0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913}
      X402_FACILITATOR_URL: ${X402_FACILITATOR_URL:-}
      X402_FACILITATOR_TOKEN: ${X402_FACILITATOR_TOKEN:-}
      X402_FACILITATOR_API_KEY: ${X402_FACILITATOR_API_KEY:-}
      X402_MAX_TIMEOUT_SECONDS: ${X402_MAX_TIMEOUT_SECONDS:-300}
      ORGS_ENABLED: ${ORGS_ENABLED:-false}
      WORKSPACES_ENABLED: ${WORKSPACES_ENABLED:-false}
      SUPERSKILL_ENABLED: ${SUPERSKILL_ENABLED:-false}
      SUPERSKILL_INDEX_PATH: ${SUPERSKILL_INDEX_PATH:-/app/data/superskill/index.json}
      SUPERSKILL_HISTORY_PATH: ${SUPERSKILL_HISTORY_PATH:-/app/data/superskill/history.json}
      SUPERSKILL_REVOCATIONS_PATH: ${SUPERSKILL_REVOCATIONS_PATH:-/app/data/superskill/revocations.jsonl}
      SUPERSKILL_TOKEN_HASHES: ${SUPERSKILL_TOKEN_HASHES:-}
      SUPERSKILL_TELEMETRY_SALT: ${SUPERSKILL_TELEMETRY_SALT:-}
      SUPERSKILL_TELEMETRY_ENABLED: ${SUPERSKILL_TELEMETRY_ENABLED:-true}
      SUPERSKILL_SUBJECT_SALT: ${SUPERSKILL_SUBJECT_SALT:-}
      COMMUNITY_INVITE_SECRET: ${COMMUNITY_INVITE_SECRET:-}
      HARNESS_WEBHOOK_TOKEN: ${HARNESS_WEBHOOK_TOKEN:?HARNESS_WEBHOOK_TOKEN is required}
      HOSTED_RESOURCE_PUBLISH_ENABLED: ${HOSTED_RESOURCE_PUBLISH_ENABLED:-false}
      RESOURCE_ARCHIVE_DIR: ${RESOURCE_ARCHIVE_DIR:-/var/lib/onlyharness/resource-archives}
      RESOURCE_IMPORT_ARCHIVE_DIR: ${RESOURCE_IMPORT_ARCHIVE_DIR:-/var/lib/onlyharness/resource-import-archives}
      RESOURCE_IMPORT_READ_ENABLED: ${RESOURCE_IMPORT_READ_ENABLED:-true}
      RESOURCE_RELEASES_USE_LOCAL_STORE: ${RESOURCE_RELEASES_USE_LOCAL_STORE:-false}
    volumes:
      - onlyharness_data:/app/data
      - ${RESOURCE_ARCHIVE_DIR:-/var/lib/onlyharness/resource-archives}:${RESOURCE_ARCHIVE_DIR:-/var/lib/onlyharness/resource-archives}:ro
      - ${RESOURCE_IMPORT_ARCHIVE_DIR:-/var/lib/onlyharness/resource-import-archives}:${RESOURCE_IMPORT_ARCHIVE_DIR:-/var/lib/onlyharness/resource-import-archives}:rw
    expose:
      - "8787"

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
      args:
        VITE_HARNESS_API_URL: ${VITE_HARNESS_API_URL:-https://superskill.sh/api}
        VITE_DEFAULT_SKIN: ${VITE_DEFAULT_SKIN:-superskill}
        VITE_ENABLE_SKIN_SWITCHER: ${VITE_ENABLE_SKIN_SWITCHER:-false}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
  onlyharness_data:
