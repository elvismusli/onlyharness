<!doctype html>
<!-- Human-readable source companion for /og-card.svg and /og.png. -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SuperSkill social preview</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 1200px; height: 630px; overflow: hidden; }
    body { background: #f6f4ef; color: #1a1917; font-family: "Schibsted Grotesk", Arial, sans-serif; }
    main { position: relative; height: 100%; padding: 54px 64px; background: radial-gradient(circle at 81% 13%, #cce9e6 0, transparent 38%); }
    header { display: flex; align-items: center; justify-content: space-between; }
    .brand { display: flex; align-items: center; gap: 16px; font-size: 30px; font-weight: 800; letter-spacing: -.04em; }
    .mark { width: 56px; height: 56px; border-radius: 12px; background: #0f736e url('/brand/superskill-mark.svg') center/cover; }
    .domain, .eyebrow, footer { font-family: "IBM Plex Mono", ui-monospace, monospace; font-weight: 700; }
    .domain { color: #6b6862; font-size: 18px; }
    .eyebrow { margin-top: 64px; color: #0f736e; font-size: 16px; letter-spacing: .08em; }
    h1 { margin: 28px 0 0; max-width: 980px; font-size: 64px; line-height: 1.12; letter-spacing: -.045em; }
    p { margin: 36px 0 0; color: #6b6862; font-size: 24px; line-height: 1.4; }
    footer { position: absolute; left: 64px; bottom: 53px; display: flex; align-items: center; gap: 48px; color: #6b6862; font-size: 14px; }
    .badge { border: 1px solid #0f736e; border-radius: 999px; padding: 10px 18px; background: #e6f0ef; color: #0b5a56; }
  </style>
</head>
<body>
  <main>
    <header><div class="brand"><span class="mark"></span><span>SuperSkill</span></div><span class="domain">superskill.sh</span></header>
    <div class="eyebrow">ONE LINK · EVERY AGENT SKILL</div>
    <h1>Paste one link.<br>Give your agent every skill.</h1>
    <p>Install SuperSkill once, then search and use exact skills<br>from Codex or Claude Code.</p>
    <footer><span class="badge">UNIVERSAL INSTALL</span><span>CODEX</span><span>CLAUDE CODE</span></footer>
  </main>
</body>
</html>
