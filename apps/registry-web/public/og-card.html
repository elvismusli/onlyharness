<!doctype html>
<!-- Source for /og.png. Render at 1200x630 with a 2x device scale. -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 1200px; height: 630px; overflow: hidden; }
    body { background: #f4f0e8; color: #141414; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    main { height: 100%; padding: 62px 70px 54px; display: flex; flex-direction: column; border: 18px solid #111; }
    header { display: flex; align-items: center; justify-content: space-between; }
    .brand { display: flex; align-items: center; gap: 18px; font-size: 34px; font-weight: 800; letter-spacing: -.04em; }
    .mark { width: 54px; height: 54px; display: grid; place-items: center; background: #f0ff47; border: 3px solid #111; box-shadow: 6px 6px 0 #111; font-size: 28px; }
    .domain { font: 700 20px ui-monospace, SFMono-Regular, Menlo, monospace; border-bottom: 4px solid #f0ff47; }
    h1 { max-width: 920px; margin: 82px 0 0; font-size: 76px; line-height: .98; letter-spacing: -.065em; }
    .accent { background: #f0ff47; padding: 0 .08em; }
    footer { margin-top: auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 40px; }
    p { margin: 0; max-width: 760px; font-size: 27px; line-height: 1.25; font-weight: 550; }
    .link { flex: none; padding: 15px 18px; background: #111; color: #fff; font: 700 18px ui-monospace, SFMono-Regular, Menlo, monospace; }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="brand"><span class="mark">S</span><span>SuperSkill</span></div>
      <div class="domain">superskill.sh</div>
    </header>
    <h1>One link. The <span class="accent">right skill</span> for your agent.</h1>
    <footer>
      <p>Reviewed capabilities, exact releases, safe client routing, and explicit activation consent.</p>
      <div class="link">/api/superskill/install</div>
    </footer>
  </main>
</body>
</html>
