schemaVersion: harness.v0.1
name: data-quality-sentinel
title: Data Quality Sentinel
summary: Audits metric definitions, source freshness and dashboard evidence
  before a business decision relies on the data.
version: 0.1.0
license: MIT
maintainers:
  - name: Harness.Hub Local
tags:
  - data
  - analytics
  - quality
runtime:
  primary: openai-agents-sdk
  adapters:
    - langgraph
entrypoint:
  command: npm run harness:run
  cwd: .
inputs:
  - id: request
    type: markdown
    required: true
outputs:
  - id: final_result
    type: markdown
agents:
  - id: source_mapper
    role: map_data_sources
    title: Source Mapper
    prompt: agents/source_mapper.md
    tools: []
    handoffs: []
  - id: anomaly_checker
    role: check_metric_anomalies
    title: Anomaly Checker
    prompt: agents/anomaly_checker.md
    tools: []
    handoffs: []
  - id: decision_guard
    role: write_decision_guard
    title: Decision Guard
    prompt: agents/decision_guard.md
    tools: []
    handoffs: []
workflow:
  entrypoint: source_mapper
  stages:
    - id: sources
      agent: source_mapper
    - id: anomalies
      agent: anomaly_checker
    - id: guard
      agent: decision_guard
tools:
  mcp_servers: []
  function_tools: []
  external_apis: []
permissions:
  network: "false"
  network_allowlist: []
  filesystem: readonly
  shell: false
  browser: false
  credentials: runtime_injected
  external_send: false
  money_movement: false
  user_data: false
  human_approval_required:
    - external_send
    - money_movement
secrets:
  required:
    - OPENAI_API_KEY
  optional: []
evals:
  promptfoo_config: evals/promptfooconfig.yaml
  command: npx promptfoo@latest eval -c evals/promptfooconfig.yaml -o
    .harnesshub/results.json -o .harnesshub/report.html -o
    .harnesshub/results.junit.xml
quality_gates:
  min_score: 0.82
  max_regression: 0.03
  max_cost_usd_per_run: 3
  max_risk_score: 39
  required_checks:
    - schema_valid
    - eval_passed
    - no_high_risk_permission_delta
examples:
  - title: Smoke example
    input: examples/input.md
    output: examples/expected.md
