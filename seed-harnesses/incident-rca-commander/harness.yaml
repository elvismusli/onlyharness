schemaVersion: harness.v0.1
name: incident-rca-commander
title: Incident RCA Commander
summary: Turns incident notes, logs and customer impact into a concise RCA,
  mitigation plan and follow-up checklist.
version: 0.1.0
license: MIT
maintainers:
  - name: Harness.Hub Local
tags:
  - incident
  - reliability
  - operations
runtime:
  primary: openai-agents-sdk
  adapters:
    - langgraph
entrypoint:
  command: npm run harness:run
  cwd: .
inputs:
  - id: request
    type: markdown
    required: true
outputs:
  - id: final_result
    type: markdown
agents:
  - id: timeline_builder
    role: build_incident_timeline
    title: Timeline Builder
    prompt: agents/timeline_builder.md
    tools: []
    handoffs: []
  - id: blast_radius_checker
    role: quantify_blast_radius
    title: Blast Radius Checker
    prompt: agents/blast_radius_checker.md
    tools: []
    handoffs: []
  - id: fix_plan_writer
    role: write_fix_plan
    title: Fix Plan Writer
    prompt: agents/fix_plan_writer.md
    tools: []
    handoffs: []
workflow:
  entrypoint: timeline_builder
  stages:
    - id: timeline
      agent: timeline_builder
    - id: impact
      agent: blast_radius_checker
    - id: fix_plan
      agent: fix_plan_writer
tools:
  mcp_servers: []
  function_tools: []
  external_apis: []
permissions:
  network: "false"
  network_allowlist: []
  filesystem: readonly
  shell: false
  browser: false
  credentials: runtime_injected
  external_send: false
  money_movement: false
  user_data: false
  human_approval_required:
    - external_send
    - money_movement
secrets:
  required:
    - OPENAI_API_KEY
  optional: []
evals:
  promptfoo_config: evals/promptfooconfig.yaml
  command: npx promptfoo@latest eval -c evals/promptfooconfig.yaml -o
    .harnesshub/results.json -o .harnesshub/report.html -o
    .harnesshub/results.junit.xml
quality_gates:
  min_score: 0.82
  max_regression: 0.03
  max_cost_usd_per_run: 3
  max_risk_score: 39
  required_checks:
    - schema_valid
    - eval_passed
    - no_high_risk_permission_delta
examples:
  - title: Smoke example
    input: examples/input.md
    output: examples/expected.md
