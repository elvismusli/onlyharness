schemaVersion: harness.v0.2
name: launch-readiness-reviewer
title: Launch Readiness Reviewer
summary: Reviews launch scope, user-visible promises, rollout gates and rollback
  criteria before a feature goes live.
version: 0.2.0
license: MIT
source:
  upstream_url: https://github.com/elvismusli/onlyharness/tree/main/seed-harnesses/launch-readiness-reviewer
  upstream_license: MIT
  attribution: OnlyHarness first-party instruction harness
  authors:
    - OnlyHarness
  vendor_policy: original
maintainers:
  - name: Harness.Hub Local
tags:
  - launch
  - release
  - readiness
runtime:
  primary: none
  adapters: []
inputs:
  - id: request
    type: markdown
    required: true
outputs:
  - id: final_result
    type: markdown
agents:
  - id: scope_reader
    role: read_launch_scope
    title: Scope Reader
    prompt: agents/scope_reader.md
    tools: []
    handoffs: []
  - id: readiness_checker
    role: check_launch_gates
    title: Readiness Checker
    prompt: agents/readiness_checker.md
    tools: []
    handoffs: []
  - id: rollout_writer
    role: write_rollout_plan
    title: Rollout Writer
    prompt: agents/rollout_writer.md
    tools: []
    handoffs: []
workflow:
  entrypoint: scope_reader
  stages:
    - id: scope
      agent: scope_reader
    - id: readiness
      agent: readiness_checker
    - id: rollout
      agent: rollout_writer
tools:
  mcp_servers: []
  function_tools: []
  external_apis: []
permissions:
  network: "false"
  network_allowlist: []
  filesystem: readonly
  shell: false
  browser: false
  credentials: "false"
  external_send: false
  money_movement: false
  user_data: false
  human_approval_required:
    - external_send
    - money_movement
secrets:
  required: []
  optional: []
evals:
  promptfoo_config: evals/promptfooconfig.yaml
  command: npx promptfoo@latest eval -c evals/promptfooconfig.yaml -o
    .harnesshub/results.json -o .harnesshub/report.html -o
    .harnesshub/results.junit.xml
quality_gates:
  min_score: 0.82
  max_regression: 0.03
  max_cost_usd_per_run: 3
  max_risk_score: 39
  required_checks:
    - schema_valid
    - eval_passed
    - no_high_risk_permission_delta
examples:
  - title: Smoke example
    input: examples/input.md
    output: examples/expected.md
