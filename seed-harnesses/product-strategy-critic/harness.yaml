schemaVersion: harness.v0.2
name: product-strategy-critic
title: Product Strategy Critic
summary: Critiques product plans, identifies weak assumptions and returns a
  concrete MVP recommendation.
version: 0.2.0
license: MIT
source:
  upstream_url: https://github.com/elvismusli/onlyharness/tree/main/seed-harnesses/product-strategy-critic
  upstream_license: MIT
  attribution: OnlyHarness first-party instruction harness
  authors:
    - OnlyHarness
  vendor_policy: original
maintainers:
  - name: Harness.Hub Local
tags:
  - product
  - strategy
  - mvp
runtime:
  primary: none
  adapters: []
inputs:
  - id: request
    type: markdown
    required: true
outputs:
  - id: final_result
    type: markdown
agents:
  - id: plan_reader
    role: extract_plan
    title: Plan Reader
    prompt: agents/plan_reader.md
    tools: []
    handoffs: []
  - id: critic
    role: find_risks
    title: Critic
    prompt: agents/critic.md
    tools: []
    handoffs: []
  - id: recommender
    role: recommend_mvp
    title: Recommender
    prompt: agents/recommender.md
    tools: []
    handoffs: []
workflow:
  entrypoint: plan_reader
  stages:
    - id: extract
      agent: plan_reader
    - id: critique
      agent: critic
    - id: recommend
      agent: recommender
tools:
  mcp_servers:
    - id: web_search
      required: false
      package: "@modelcontextprotocol/server-web-search"
      pinned: true
      allowlist:
        - api.openai.com
  function_tools: []
  external_apis: []
permissions:
  network: allowlist
  network_allowlist:
    - api.openai.com
  filesystem: readonly
  shell: false
  browser: false
  credentials: runtime_injected
  external_send: false
  money_movement: false
  user_data: false
  human_approval_required:
    - external_send
    - money_movement
secrets:
  required: []
  optional: []
evals:
  promptfoo_config: evals/promptfooconfig.yaml
  command: npx promptfoo@latest eval -c evals/promptfooconfig.yaml -o
    .harnesshub/results.json -o .harnesshub/report.html -o
    .harnesshub/results.junit.xml
quality_gates:
  min_score: 0.82
  max_regression: 0.03
  max_cost_usd_per_run: 3
  max_risk_score: 39
  required_checks:
    - schema_valid
    - eval_passed
    - no_high_risk_permission_delta
examples:
  - title: Smoke example
    input: examples/input.md
    output: examples/expected.md
