schemaVersion: harness.v0.2
name: founder-decision-memo
title: Founder Decision Memo
summary: Converts messy context into a short decision memo with recommendation,
  tradeoffs and next action.
version: 0.2.0
license: MIT
source:
  upstream_url: https://github.com/elvismusli/onlyharness/tree/main/seed-harnesses/founder-decision-memo
  upstream_license: MIT
  attribution: OnlyHarness first-party instruction harness
  authors:
    - OnlyHarness
  vendor_policy: original
maintainers:
  - name: Harness.Hub Local
tags:
  - founder
  - decision
  - memo
runtime:
  primary: none
  adapters: []
inputs:
  - id: request
    type: markdown
    required: true
outputs:
  - id: final_result
    type: markdown
agents:
  - id: context_compressor
    role: compress_context
    title: Context Compressor
    prompt: agents/context_compressor.md
    tools: []
    handoffs: []
  - id: option_critic
    role: compare_options
    title: Option Critic
    prompt: agents/option_critic.md
    tools: []
    handoffs: []
  - id: memo_writer
    role: write_memo
    title: Memo Writer
    prompt: agents/memo_writer.md
    tools: []
    handoffs: []
workflow:
  entrypoint: context_compressor
  stages:
    - id: compress
      agent: context_compressor
    - id: compare
      agent: option_critic
    - id: memo
      agent: memo_writer
tools:
  mcp_servers:
    - id: web_search
      required: false
      package: "@modelcontextprotocol/server-web-search"
      pinned: true
      allowlist:
        - api.openai.com
  function_tools: []
  external_apis: []
permissions:
  network: allowlist
  network_allowlist:
    - api.openai.com
  filesystem: readonly
  shell: false
  browser: false
  credentials: runtime_injected
  external_send: false
  money_movement: false
  user_data: false
  human_approval_required:
    - external_send
    - money_movement
secrets:
  required: []
  optional: []
evals:
  promptfoo_config: evals/promptfooconfig.yaml
  command: npx promptfoo@latest eval -c evals/promptfooconfig.yaml -o
    .harnesshub/results.json -o .harnesshub/report.html -o
    .harnesshub/results.junit.xml
quality_gates:
  min_score: 0.82
  max_regression: 0.03
  max_cost_usd_per_run: 3
  max_risk_score: 39
  required_checks:
    - schema_valid
    - eval_passed
    - no_high_risk_permission_delta
examples:
  - title: Smoke example
    input: examples/input.md
    output: examples/expected.md
