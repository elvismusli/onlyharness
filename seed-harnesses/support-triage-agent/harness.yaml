schemaVersion: harness.v0.2
name: support-triage-agent
title: Support Triage Agent
summary: Classifies support tickets, extracts exact customer quotes and drafts
  replies without auto-send.
version: 0.2.0
license: MIT
source:
  upstream_url: https://github.com/elvismusli/onlyharness/tree/main/seed-harnesses/support-triage-agent
  upstream_license: MIT
  attribution: OnlyHarness first-party instruction harness
  authors:
    - OnlyHarness
  vendor_policy: original
maintainers:
  - name: Harness.Hub Local
tags:
  - support
  - triage
  - drafting
runtime:
  primary: none
  adapters: []
inputs:
  - id: request
    type: markdown
    required: true
outputs:
  - id: final_result
    type: markdown
agents:
  - id: classifier
    role: classify_ticket
    title: Classifier
    prompt: agents/classifier.md
    tools: []
    handoffs: []
  - id: quote_extractor
    role: extract_exact_quote
    title: Quote Extractor
    prompt: agents/quote_extractor.md
    tools: []
    handoffs: []
  - id: drafter
    role: draft_reply
    title: Drafter
    prompt: agents/drafter.md
    tools: []
    handoffs: []
workflow:
  entrypoint: classifier
  stages:
    - id: classify
      agent: classifier
    - id: quote
      agent: quote_extractor
    - id: draft
      agent: drafter
tools:
  mcp_servers:
    - id: web_search
      required: false
      package: "@modelcontextprotocol/server-web-search"
      pinned: true
      allowlist:
        - api.openai.com
  function_tools: []
  external_apis: []
permissions:
  network: allowlist
  network_allowlist:
    - api.openai.com
  filesystem: readonly
  shell: false
  browser: false
  credentials: runtime_injected
  external_send: false
  money_movement: false
  user_data: false
  human_approval_required:
    - external_send
    - money_movement
secrets:
  required: []
  optional: []
evals:
  promptfoo_config: evals/promptfooconfig.yaml
  command: npx promptfoo@latest eval -c evals/promptfooconfig.yaml -o
    .harnesshub/results.json -o .harnesshub/report.html -o
    .harnesshub/results.junit.xml
quality_gates:
  min_score: 0.82
  max_regression: 0.03
  max_cost_usd_per_run: 3
  max_risk_score: 39
  required_checks:
    - schema_valid
    - eval_passed
    - no_high_risk_permission_delta
examples:
  - title: Smoke example
    input: examples/input.md
    output: examples/expected.md
